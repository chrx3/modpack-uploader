<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChrisCraft · Modpacks</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0e0f12; color: #e5e7eb;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; padding: 32px 16px;
    }
    .wrap { width: 100%; max-width: 720px; }
    header { text-align: center; margin-bottom: 32px; }
    h1 { font-size: 28px; font-weight: 700; color: #a7f3d0; }
    .sub { color: #9ca3af; margin-top: 6px; font-size: 14px; }
    .card {
      background: #18181b; border: 1px solid #27272a; border-radius: 12px;
      padding: 24px; margin-bottom: 20px;
    }
    .card h2 {
      font-size: 16px; font-weight: 600; margin-bottom: 14px;
      color: #fbbf24;
    }
    .empty { color: #6b7280; font-size: 14px; padding: 20px; text-align: center; }
    ul.files { list-style: none; }
    ul.files li {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 14px; background: #0f1014; border-radius: 8px;
      margin-bottom: 8px; font-size: 14px;
    }
    .fname { color: #f3f4f6; font-family: 'SF Mono', Menlo, monospace; }
    .fsize { color: #9ca3af; font-size: 12px; }
    a.dl {
      display: inline-block; padding: 6px 14px;
      background: #10b981; color: #052e16;
      border-radius: 6px; text-decoration: none; font-weight: 600; font-size: 13px;
    }
    a.dl:hover { background: #34d399; }
    .upload-btn {
      display: inline-block; padding: 12px 24px;
      background: #2563eb; color: white;
      border-radius: 8px; text-decoration: none; font-weight: 600;
      transition: background 0.15s;
    }
    .upload-btn:hover { background: #3b82f6; }
    .meta { font-size: 12px; color: #6b7280; margin-top: 16px; text-align: center; }
    code { background: #27272a; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>⛏️ ChrisCraft Modpacks</h1>
      <div class="sub">Modpacks para el server <code>minecraft.chrsx3.com</code></div>
    </header>

    <div class="card">
      <h2>📦 Modpacks disponibles</h2>
      <div id="files">
        <div class="empty">Cargando…</div>
      </div>
    </div>

    <div style="text-align:center; margin-top: 24px;">
      <a class="upload-btn" href="/upload/">⬆️ Subir nuevo modpack</a>
    </div>

    <div class="meta">
      Hermano, subís el <code>.mrpack</code>, yo lo proceso y se deploya al server.
    </div>
  </div>

  <script>
    function humanSize(b) {
      if (b < 1024) return b + ' B';
      if (b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
      return (b/1024/1024).toFixed(2) + ' MB';
    }
    async function load() {
      try {
        const r = await fetch('/api/status');
        const j = await r.json();
        const target = document.getElementById('files');
        const all = [...j.files_ready, ...j.incoming];
        if (!all.length) {
          target.innerHTML = '<div class="empty">No hay modpacks todavía. Subí el primero ↓</div>';
          return;
        }
        const items = all.map(name => {
          const info = (j.processed || {})[name] || {};
          const status = info.status === 'pending' ? ' ⏳' : '';
          return `<li>
            <div>
              <div class="fname">${name}${status}</div>
              <div class="fsize">${info.size ? humanSize(info.size) : ''}</div>
            </div>
            <a class="dl" href="/files/${name}">Descargar</a>
          </li>`;
        }).join('');
        target.innerHTML = `<ul class="files">${items}</ul>`;
      } catch (e) {
        document.getElementById('files').innerHTML =
          '<div class="empty">Error cargando: ' + e.message + '</div>';
      }
    }
    load();
    setInterval(load, 8000);
  </script>
</body>
</html>
