worker_processes 1;
pid /tmp/nginx.pid;
error_log /tmp/nginx_error.log warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    client_body_temp_path /tmp/client_body;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    # Upload size — mrpack can be ~50MB
    client_max_body_size 200M;
    client_body_buffer_size 128k;
    client_body_timeout 300s;

    access_log /tmp/nginx_access.log;

    upstream uploader {
        server 127.0.0.1:5050;
    }

    server {
        listen 80 default_server;
        server_name _;
        root /var/www/html;
        index index.html;

        # Health
        location = /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Static files (public download)
        location /files/ {
            alias /data/files/;
            autoindex off;
            add_header Content-Disposition "attachment";
        }

        # Public listing of available modpacks (handled by Python)
        location = /api/status {
            proxy_pass http://uploader;
        }
        location = /api/list_fallback {
            internal;
            return 200 '{"files":[]}';
        }

        # Upload endpoint — Basic Auth
        location /upload/ {
            auth_basic "Modpack Upload";
            auth_basic_user_file /data/.htpasswd;

            location /upload/ {
                # POST = handle upload via Python
                if ($request_method = POST) {
                    proxy_pass http://uploader;
                    break;
                }
                # GET = show upload form (static html)
                try_files /upload.html =404;
            }
        }

        # Upload API (auth-protected)
        location /api/upload {
            auth_basic "Modpack Upload";
            auth_basic_user_file /data/.htpasswd;
            proxy_pass http://uploader;
            proxy_request_buffering off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Default landing
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Block everything else
        location ~ /\.(ht|git) { deny all; }
    }
}
